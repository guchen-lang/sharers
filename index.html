<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharers — Local Notes & Todos</title>
    <style>
        :root{--bg:#0f1724;--card:rgba(255,255,255,0.06);--accent:#4facfe;--muted:rgba(255,255,255,0.7)}
        *{box-sizing:border-box}
        body{margin:0;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(135deg,#041028 0%,#072034 100%);color:#e6eef8;height:100vh;display:flex}
        .sidebar{width:320px;background:linear-gradient(180deg,rgba(255,255,255,0.03),transparent);padding:16px;display:flex;flex-direction:column;gap:12px}
        .brand{font-weight:700;font-size:18px;color:var(--accent)}
        .controls{display:flex;gap:8px}
        .search{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
        .btn{padding:8px 12px;border-radius:8px;border:none;background:var(--accent);color:#00233a;cursor:pointer}
        .list{flex:1;overflow:auto;padding-top:8px}
        .note-item{padding:10px;border-radius:8px;margin-bottom:8px;background:var(--card);cursor:pointer}
        .note-item.active{outline:2px solid rgba(79,172,254,0.15)}
        .meta{font-size:12px;color:var(--muted);margin-top:6px}
        .main{flex:1;padding:18px;display:flex;flex-direction:column;gap:12px}
        .toolbar{display:flex;gap:8px;align-items:center}
        .editor-area{display:flex;gap:12px;flex:1;min-height:0}
        .pane{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px;border-radius:10px;min-height:200px}
        textarea{width:100%;height:100%;resize:none;background:transparent;border:none;color:inherit;font-family:inherit;font-size:14px}
        .preview{overflow:auto}
        .todos{display:flex;flex-direction:column;gap:8px}
        .todo{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)}
        .small{font-size:13px;color:var(--muted)}
        .muted{color:var(--muted)}
        .top-row{display:flex;justify-content:space-between;align-items:center}
        .danger{background:#ff6b6b;color:#2b0a0a}
        .icon{opacity:0.9}
        footer{font-size:12px;color:var(--muted);padding:8px;text-align:center}
        .file-actions{display:flex;gap:8px}
        @media (max-width:900px){.sidebar{display:none}.main{padding:12px}}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="top-row">
            <div>
                <div class="brand">Sharers — 本地笔记 & 待办</div>
                <div class="small">所有数据保存在本地 (localStorage)</div>
            </div>
            <div class="file-actions">
                <button id="exportBtn" class="btn" title="导出所有数据">导出</button>
                <button id="importBtn" class="btn" title="导入数据">导入</button>
            </div>
        </div>

        <div class="controls">
            <input id="search" class="search" placeholder="搜索笔记或内容..." />
            <button id="newNote" class="btn">新建</button>
        </div>

        <div class="list" id="notesList" aria-label="Notes list"></div>
        <footer>版本: Sharer V2 改进版</footer>
    </div>

    <div class="main">
        <div class="toolbar">
            <div style="display:flex;gap:8px;align-items:center;flex:1">
                <input id="title" placeholder="未命名笔记" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit;flex:1" />
                <select id="mode" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit">
                    <option value="note">笔记 (Markdown)</option>
                    <option value="todo">待办 (Todo List)</option>
                </select>
            </div>
            <div style="display:flex;gap:8px">
                <button id="saveBtn" class="btn">保存</button>
                <button id="deleteBtn" class="btn danger">删除</button>
            </div>
        </div>

        <div class="editor-area">
            <div class="pane" style="flex:1.1">
                <textarea id="editor" placeholder="在此输入 Markdown 或 TODO..."></textarea>
            </div>
            <div class="pane" style="flex:1">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <div class="small">预览</div>
                    <div class="small muted" id="updatedAt"></div>
                </div>
                <hr style="border:none;border-top:1px solid rgba(255,255,255,0.03);margin:8px 0" />
                <div class="preview" id="preview"></div>
            </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="small muted">自动保存至 localStorage · 可导入/导出 JSON</div>
            <div style="display:flex;gap:8px">
                <button id="clearAll" class="btn danger">清空所有</button>
            </div>
        </div>
    </div>

    <input id="fileInput" type="file" accept="application/json" style="display:none" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Simple local notes & todo app
        const STORAGE_KEY = 'sharers.v2.data';

        function uid() { return 'id_' + Math.random().toString(36).slice(2,9); }

        let state = { notes: {}, order: [] };
        let currentId = null;

        // DOM
        const notesList = document.getElementById('notesList');
        const newNoteBtn = document.getElementById('newNote');
        const titleEl = document.getElementById('title');
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const saveBtn = document.getElementById('saveBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const modeSel = document.getElementById('mode');
        const searchEl = document.getElementById('search');
        const updatedAtEl = document.getElementById('updatedAt');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const fileInput = document.getElementById('fileInput');
        const clearAll = document.getElementById('clearAll');

        // load
        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) state = JSON.parse(raw);
            } catch(e){ console.error('load error', e); }
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function formatDate(ts){ if(!ts) return ''; return new Date(ts).toLocaleString(); }

        function renderNotesList(filter=''){
            notesList.innerHTML = '';
            const ids = state.order.slice().reverse();
            ids.forEach(id => {
                const n = state.notes[id];
                if(!n) return;
                const text = (n.type === 'todo') ? (n.title || 'Untitled Todo') : (n.title || 'Untitled Note');
                if(filter && !(text + '\n' + (n.content||'')).toLowerCase().includes(filter.toLowerCase())) return;
                const item = document.createElement('div');
                item.className = 'note-item' + (id===currentId ? ' active' : '');
                item.innerHTML = `<div style="font-weight:600">${escapeHtml(text)}</div><div class="meta">${n.type} · ${formatDate(n.updated)}</div>`;
                item.onclick = ()=>{ selectNote(id); };
                notesList.appendChild(item);
            });
            if(!notesList.firstChild){
                const p = document.createElement('div');
                p.className = 'muted small';
                p.textContent = '还没有笔记 — 点击 新建 开始';
                notesList.appendChild(p);
            }
        }

        function selectNote(id){
            currentId = id;
            const n = state.notes[id];
            if(!n) return;
            titleEl.value = n.title || '';
            editor.value = n.content || '';
            modeSel.value = n.type || 'note';
            renderPreview();
            updatedAtEl.textContent = '更新: ' + formatDate(n.updated);
            renderNotesList(searchEl.value);
        }

        function newNote(){
            const id = uid();
            const now = Date.now();
            const note = { id, title: '新笔记', content: '# 新笔记\n\n开始写吧...', created: now, updated: now, type: 'note' };
            state.notes[id] = note;
            state.order.push(id);
            save();
            selectNote(id);
        }

        function saveCurrent(){
            if(!currentId) return;
            const n = state.notes[currentId];
            n.title = titleEl.value;
            n.content = editor.value;
            n.type = modeSel.value;
            n.updated = Date.now();
            // For todo type, ensure content is JSON list or fallback
            if(n.type === 'todo'){
                try{ JSON.parse(n.content); }catch(e){
                    // if plain text, convert lines to todo items
                    const lines = n.content.split('\n').filter(Boolean);
                    const todos = lines.map(l=>({text:l,done:false}));
                    n.content = JSON.stringify(todos);
                }
            }
            save();
            updatedAtEl.textContent = '更新: ' + formatDate(n.updated);
            renderNotesList(searchEl.value);
        }

        function deleteCurrent(){
            if(!currentId) return;
            if(!confirm('确认删除此笔记/待办？此操作不可撤销。')) return;
            delete state.notes[currentId];
            state.order = state.order.filter(x=>x!==currentId);
            currentId = null;
            save();
            renderNotesList(searchEl.value);
            titleEl.value = '';
            editor.value = '';
            preview.innerHTML = '';
            updatedAtEl.textContent = '';
        }

        function renderPreview(){
            const txt = editor.value || '';
            if(modeSel.value === 'note'){
                // Markdown
                try{ preview.innerHTML = marked.parse(txt); }catch(e){ preview.textContent = txt; }
            } else {
                // Todo
                let items = [];
                try{ items = JSON.parse(txt); }catch(e){
                    items = txt.split('\n').filter(Boolean).map(l=>({text:l,done:false}));
                }
                preview.innerHTML = '';
                const container = document.createElement('div');
                container.className = 'todos';
                items.forEach((it, idx)=>{
                    const row = document.createElement('div');
                    row.className = 'todo';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox'; cb.checked = !!it.done;
                    cb.onchange = ()=>{
                        items[idx].done = cb.checked;
                        editor.value = JSON.stringify(items);
                        saveCurrent();
                    };
                    const span = document.createElement('div');
                    span.textContent = it.text || '';
                    span.style.flex = '1';
                    const del = document.createElement('button');
                    del.textContent = '删除'; del.className = 'btn';
                    del.onclick = ()=>{
                        items.splice(idx,1); editor.value = JSON.stringify(items); saveCurrent(); renderPreview();
                    };
                    row.appendChild(cb); row.appendChild(span); row.appendChild(del);
                    container.appendChild(row);
                });
                const addRow = document.createElement('div');
                addRow.style.display='flex'; addRow.style.gap='8px'; addRow.style.marginTop='8px';
                const addInput = document.createElement('input'); addInput.placeholder='添加待办项'; addInput.style.flex='1'; addInput.style.padding='8px'; addInput.style.borderRadius='8px'; addInput.style.border='1px solid rgba(255,255,255,0.06)'; addInput.style.background='transparent'; addInput.style.color='inherit';
                const addBtn = document.createElement('button'); addBtn.textContent='添加'; addBtn.className='btn';
                addBtn.onclick = ()=>{ if(!addInput.value) return; items.push({text:addInput.value,done:false}); editor.value = JSON.stringify(items); saveCurrent(); renderPreview(); addInput.value=''; };
                addRow.appendChild(addInput); addRow.appendChild(addBtn);
                container.appendChild(addRow);
                preview.appendChild(container);
            }
        }

        // UI bindings
        newNoteBtn.onclick = ()=>{ newNote(); };
        saveBtn.onclick = ()=>{ saveCurrent(); alert('已保存'); };
        deleteBtn.onclick = ()=>{ deleteCurrent(); };
        editor.oninput = ()=>{ renderPreview(); autoSaveDebounced(); };
        titleEl.oninput = ()=>{ autoSaveDebounced(); };
        modeSel.onchange = ()=>{ renderPreview(); };
        searchEl.oninput = ()=>{ renderNotesList(searchEl.value); };

        // export/import
        exportBtn.onclick = ()=>{
            const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download='sharers-export.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        };
        importBtn.onclick = ()=> fileInput.click();
        fileInput.onchange = async (e)=>{
            const f = e.target.files[0]; if(!f) return;
            const txt = await f.text();
            try{ const data = JSON.parse(txt); if(confirm('导入将覆盖现有数据，确认继续？')){ state = data; save(); currentId = state.order.length? state.order[state.order.length-1] : null; renderNotesList(); if(currentId) selectNote(currentId); } }
            catch(err){ alert('导入失败：文件不是有效的 JSON'); }
            fileInput.value='';
        };

        clearAll.onclick = ()=>{
            if(!confirm('确认清空所有本地数据？此操作不可撤销')) return; state = {notes:{},order:[]}; currentId=null; save(); renderNotesList(); titleEl.value=''; editor.value=''; preview.innerHTML=''; updatedAtEl.textContent='';
        };

        // autosave debounce
        let autosaveTimer = null;
        function autoSaveDebounced(){
            if(autosaveTimer) clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(()=>{
                if(!currentId) return;
                saveCurrent();
            }, 800);
        }

        // helpers
        function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

        // init
        (function(){
            load();
            // if no note, create a starter note
            if(!state.order || state.order.length===0){
                const id = uid(); const now = Date.now();
                state.notes = state.notes || {};
                state.order = state.order || [];
                state.notes[id] = { id, title: '欢迎使用 Sharers', content: '# 欢迎\n\n这是一个本地 Markdown 笔记与待办工具，所有数据保存在浏览器的 localStorage。\n\n- 新建：创建笔记或待办\n- 保存：手动保存（也会自动保存）\n- 导出/导入：JSON 格式\n\n祝使用愉快！', created: now, updated: now, type: 'note' };
                state.order.push(id);
                save();
            }
            renderNotesList();
            currentId = state.order[state.order.length-1];
            if(currentId) selectNote(currentId);
        })();
    </script>
</body>
</html>
